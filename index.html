<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>太阳系模拟 + DeepSeek 智能助手</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep:#060d1a;--bg-card:rgba(12,30,55,.9);
            --accent-purple:#7c3aed;--accent-cyan:#06b6d4;--accent-pink:#ec4899;
            --accent-amber:#f59e0b;--accent-emerald:#10b981;
            --glow-cyan:rgba(6,182,212,.4);--glow-purple:rgba(124,58,237,.35);
            --text-primary:#e2e8f0;--text-secondary:#94a3b8;
        }
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Noto Sans SC',sans-serif;background:var(--bg-deep);color:var(--text-primary);height:100vh;overflow:hidden}

        /* ═══ MAIN SPLIT + RESIZABLE DIVIDER ═══ */
        .main-layout{display:flex;height:100vh;width:100vw}
        .left-panel{width:60%;min-width:380px;position:relative;background:#050e1a;display:flex;flex-direction:column;overflow:hidden}
        .resize-handle{width:6px;background:rgba(6,182,212,.15);cursor:col-resize;flex-shrink:0;position:relative;transition:background .2s}
        .resize-handle:hover,.resize-handle.active{background:var(--accent-cyan)}
        .resize-handle::after{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:2px;height:40px;background:rgba(255,255,255,.3);border-radius:1px}
        .right-panel{flex:1;min-width:340px;overflow-y:auto;overflow-x:hidden;position:relative;display:flex;flex-direction:column}
        .right-panel::-webkit-scrollbar{width:5px}
        .right-panel::-webkit-scrollbar-thumb{background:var(--accent-purple);border-radius:3px}

        /* ═══ LEFT - SOLAR SYSTEM SIM ═══ */
        .sim-header{display:flex;flex-direction:column;gap:4px;padding:6px 10px;background:rgba(0,0,0,.4);border-bottom:1px solid rgba(6,182,212,.1);flex-shrink:0}
        .sim-header-row{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:4px}
        .sim-title{font-family:'Orbitron',sans-serif;font-size:.75rem;background:linear-gradient(135deg,var(--accent-cyan),var(--accent-purple));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
        .sim-date{font-size:.65rem;color:var(--text-secondary);font-family:'Orbitron',sans-serif;white-space:nowrap}
        .sim-season{font-size:.65rem;padding:2px 8px;border-radius:10px;font-weight:600;white-space:nowrap}
        .sim-season.spring{background:rgba(16,185,129,.2);color:#10b981;border:1px solid rgba(16,185,129,.3)}
        .sim-season.summer{background:rgba(249,115,22,.2);color:#f97316;border:1px solid rgba(249,115,22,.3)}
        .sim-season.autumn{background:rgba(251,191,36,.2);color:#fbbf24;border:1px solid rgba(251,191,36,.3)}
        .sim-season.winter{background:rgba(59,130,246,.2);color:#3b82f6;border:1px solid rgba(59,130,246,.3)}
        .sim-btn{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:6px;color:#cbd5e1;padding:3px 8px;font-size:.65rem;cursor:pointer;transition:all .2s;white-space:nowrap}
        .sim-btn:hover{background:rgba(6,182,212,.2);border-color:var(--accent-cyan)}
        .sim-btn.active{background:var(--accent-cyan);color:#000;border-color:var(--accent-cyan)}
        .sim-btn.toggle-on{background:var(--accent-purple);color:#fff;border-color:var(--accent-purple)}
        .sim-btn.danger{background:rgba(239,68,68,.15);border-color:rgba(239,68,68,.2)}
        .sim-btn.danger:hover{background:rgba(239,68,68,.3)}
        #solarCanvas{flex:1;cursor:grab;width:100%}
        #solarCanvas:active{cursor:grabbing}
        .sim-speed{display:flex;align-items:center;gap:3px}
        .sim-speed input[type=range]{width:50px;accent-color:var(--accent-cyan)}
        .speed-label{font-size:.62rem;color:var(--text-secondary)}
        .sim-focus select{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:6px;color:#cbd5e1;font-size:.65rem;padding:2px 6px;cursor:pointer}
        .sim-focus select:focus{outline:none;border-color:var(--accent-cyan)}
        .sim-focus select option{background:#0f2847}
        .planet-tooltip{position:fixed;pointer-events:none;background:rgba(15,40,71,.95);border:1px solid var(--accent-cyan);border-radius:10px;padding:10px 14px;font-size:.78rem;display:none;z-index:100;white-space:nowrap;box-shadow:0 8px 24px rgba(0,0,0,.5)}
        .planet-info-panel{position:absolute;bottom:12px;left:12px;right:12px;background:rgba(12,30,55,.92);border:1px solid rgba(6,182,212,.3);border-radius:12px;padding:14px 16px;font-size:.75rem;display:none;z-index:10;max-height:40%;overflow-y:auto}
        .planet-info-panel .close-info{position:absolute;top:6px;right:10px;background:none;border:none;color:var(--text-secondary);cursor:pointer;font-size:1.1rem}
        .planet-info-panel .info-row{display:flex;justify-content:space-between;margin-bottom:3px}
        .planet-info-panel .info-label{color:var(--text-secondary)}
        .planet-info-panel .info-val{font-weight:600;color:var(--accent-cyan)}
        .planet-info-panel .info-voice-btn{font-size:.7rem;background:rgba(16,185,129,.1);border:1px solid var(--accent-emerald);color:var(--accent-emerald);border-radius:4px;cursor:pointer;padding:2px 8px;margin-top:6px}
        .planet-info-panel .info-voice-btn:hover{background:rgba(16,185,129,.2)}
        .sim-legend{position:absolute;bottom:10px;right:10px;background:rgba(0,0,0,.5);border-radius:8px;padding:6px 8px;font-size:.62rem;color:var(--text-secondary);z-index:5;pointer-events:none;display:flex;flex-direction:column;gap:2px}

        /* Eclipse overlay */
        .eclipse-overlay{position:absolute;inset:0;pointer-events:none;display:none;z-index:4;border-radius:50%}
        .eclipse-overlay.show{display:block}

        /* ═══ RIGHT - AI AGENT ═══ */
        .right-inner{padding:10px 14px 14px;display:flex;flex-direction:column;gap:8px}
        .right-header{display:flex;align-items:center;gap:12px;padding:4px 0}
        .right-header h1{font-family:'Orbitron',sans-serif;font-size:1.3rem;font-weight:900;background:linear-gradient(135deg,var(--accent-cyan),var(--accent-purple),var(--accent-pink));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;animation:titlePulse 4s ease-in-out infinite}
        @keyframes titlePulse{0%,100%{filter:brightness(1)}50%{filter:brightness(1.15)}}

        /* ═══ ANIMATED AVATAR ═══ */
        .avatar-section{display:flex;align-items:center;gap:10px;padding:2px 0}
        .avatar-container{position:relative;width:60px;height:60px;flex-shrink:0}
        .avatar-body{width:48px;height:48px;border-radius:50%;position:absolute;bottom:0;left:50%;transform:translateX(-50%);background:radial-gradient(circle at 40% 35%,#67e8f9,#06b6d4 45%,#0891b2 80%);box-shadow:0 0 16px rgba(6,182,212,.5);animation:avatarFloat 3s ease-in-out infinite}
        .avatar-body::before{content:'';position:absolute;top:14%;left:22%;width:26%;height:20%;border-radius:50%;background:rgba(255,255,255,.55)}
        .avatar-body::after{content:'';position:absolute;top:20%;right:20%;width:14%;height:12%;border-radius:50%;background:rgba(255,255,255,.35)}
        .avatar-eye-l{position:absolute;width:9px;height:10px;background:#fff;border-radius:50%;top:30%;left:28%;transition:height .2s}
        .avatar-eye-r{position:absolute;width:9px;height:10px;background:#fff;border-radius:50%;top:30%;right:28%;transition:height .2s}
        .avatar-mouth{position:absolute;width:14px;height:4px;background:rgba(0,0,0,.6);border-radius:2px;top:52%;left:50%;transform:translateX(-50%);transition:all .3s}
        .avatar-antenna{position:absolute;width:3px;height:14px;background:var(--accent-cyan);border-radius:2px;top:-11px;left:50%;transform:translateX(-50%);animation:antennaWiggle 1.5s ease-in-out infinite}
        .avatar-antenna::after{content:'';position:absolute;width:7px;height:7px;background:var(--accent-cyan);border-radius:50%;top:-5px;left:-2px;box-shadow:0 0 6px var(--accent-cyan)}
        @keyframes avatarFloat{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(-5px)}}
        @keyframes antennaWiggle{0%,100%{transform:translateX(-50%) rotate(0deg)}25%{transform:translateX(-50%) rotate(8deg)}75%{transform:translateX(-50%) rotate(-8deg)}}
        .avatar-speaking .avatar-mouth{width:12px;height:7px;border-radius:50%;animation:mouthTalk .3s infinite}
        .avatar-speaking .avatar-eye-l,.avatar-speaking .avatar-eye-r{height:5px}
        .avatar-speaking .avatar-antenna{animation:antennaWiggle .5s ease-in-out infinite}
        @keyframes mouthTalk{0%,100%{height:3px}50%{height:9px}}
        .avatar-thinking .avatar-eye-l,.avatar-thinking .avatar-eye-r{height:2px}
        .avatar-thinking .avatar-mouth{width:7px;height:7px;border-radius:50%}
        .avatar-greeting{font-size:.78rem;color:var(--text-secondary);max-width:190px;line-height:1.4;white-space:pre-line}

        /* ═══ NAV TABS ═══ */
        .nav-tabs{display:flex;gap:5px;flex-wrap:wrap}
        .nav-tab{padding:7px 14px;border:1.5px solid transparent;border-radius:40px;background:linear-gradient(var(--bg-deep),var(--bg-deep)) padding-box,linear-gradient(135deg,var(--accent-cyan),var(--accent-purple)) border-box;color:#cbd5e1;font-size:.72rem;cursor:pointer;transition:all .25s;font-family:'Orbitron',sans-serif;white-space:nowrap}
        .nav-tab:hover{transform:translateY(-1px);box-shadow:0 4px 16px var(--glow-purple)}
        .nav-tab.active{background:linear-gradient(135deg,var(--accent-cyan),var(--accent-purple));color:#fff;box-shadow:0 4px 16px var(--glow-cyan)}
        .page{display:none}
        .page.active{display:block;animation:fadeIn .4s}
        @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

        /* ═══ API KEY SETUP ═══ */
        .api-key-row{display:flex;align-items:center;gap:6px;padding:4px 0}
        .api-key-input{flex:1;background:rgba(255,255,255,.04);border:1.5px solid rgba(124,58,237,.2);border-radius:20px;padding:6px 12px;color:#fff;font-size:.7rem;font-family:monospace;transition:all .3s}
        .api-key-input:focus{outline:none;border-color:var(--accent-cyan)}
        .api-key-input::placeholder{color:#475569;font-size:.65rem}
        .api-status{font-size:.65rem;padding:3px 10px;border-radius:10px;white-space:nowrap}
        .api-status.connected{background:rgba(16,185,129,.2);color:var(--accent-emerald)}
        .api-status.disconnected{background:rgba(239,68,68,.15);color:#ef4444}

        /* ═══ CHAT ═══ */
        .chat-box{background:var(--bg-card);border:1.5px solid rgba(124,58,237,.2);border-radius:16px;overflow:hidden}
        .chat-header-bar{background:linear-gradient(135deg,var(--accent-purple),var(--accent-cyan));padding:10px 14px;text-align:center}
        .chat-header-bar h2{font-family:'Orbitron',sans-serif;font-size:.95rem}
        .chat-messages{height:260px;overflow-y:auto;padding:10px}
        .chat-messages::-webkit-scrollbar{width:4px}
        .chat-messages::-webkit-scrollbar-thumb{background:var(--accent-purple);border-radius:2px}
        .message{display:flex;margin-bottom:10px;animation:msgIn .3s}
        .msg-user{justify-content:flex-end}
        @keyframes msgIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
        .msg-bubble{max-width:75%;padding:9px 14px;border-radius:14px;font-size:.78rem;line-height:1.6;word-break:break-word}
        .msg-user .msg-bubble{background:linear-gradient(135deg,var(--accent-cyan),var(--accent-purple));border-bottom-right-radius:4px}
        .msg-assistant .msg-bubble{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.07);border-bottom-left-radius:4px}
        .msg-avatar{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.8rem;margin:0 5px;flex-shrink:0}
        .msg-user .msg-avatar{order:2;background:linear-gradient(135deg,var(--accent-pink),var(--accent-purple))}
        .msg-assistant .msg-avatar{order:1;background:linear-gradient(135deg,var(--accent-cyan),var(--accent-purple))}
        .chat-input-area{padding:8px 10px;background:rgba(0,0,0,.2);border-top:1px solid rgba(255,255,255,.05)}
        .chat-input-row{display:flex;gap:6px;align-items:center}
        .chat-input{flex:1;background:rgba(255,255,255,.04);border:1.5px solid rgba(124,58,237,.2);border-radius:30px;padding:9px 14px;color:#fff;font-size:.78rem;font-family:'Noto Sans SC',sans-serif;transition:all .3s}
        .chat-input:focus{outline:none;border-color:var(--accent-cyan);box-shadow:0 0 16px var(--glow-cyan)}
        .chat-input::placeholder{color:#475569}
        .btn-icon{width:32px;height:32px;border-radius:50%;border:none;cursor:pointer;transition:all .3s;display:flex;align-items:center;justify-content:center;font-size:.85rem;flex-shrink:0}
        .btn-send{background:linear-gradient(135deg,var(--accent-cyan),var(--accent-purple));color:#fff}
        .btn-send:hover{transform:scale(1.08);box-shadow:0 4px 14px var(--glow-cyan)}
        .btn-mic{background:rgba(255,255,255,.08);color:var(--text-secondary);border:1.5px solid rgba(255,255,255,.1)}
        .btn-mic:hover{background:rgba(6,182,212,.2);color:var(--accent-cyan)}
        .btn-mic.recording{background:#ef4444;color:#fff;animation:pulse-rec 1s infinite;border-color:#ef4444}
        @keyframes pulse-rec{0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,.5)}50%{box-shadow:0 0 0 8px rgba(239,68,68,0)}}
        .btn-speaker{background:rgba(255,255,255,.08);color:var(--text-secondary);border:1.5px solid rgba(255,255,255,.1)}
        .btn-speaker:hover{background:rgba(16,185,129,.2);color:var(--accent-emerald);border-color:var(--accent-emerald)}
        .suggestions{display:flex;flex-wrap:wrap;gap:5px;padding:6px 10px 8px;justify-content:center}
        .sug-btn{background:rgba(255,255,255,.03);border:1px solid rgba(6,182,212,.2);border-radius:12px;padding:3px 10px;color:#cbd5e1;font-size:.68rem;cursor:pointer;transition:all .25s}
        .sug-btn:hover{background:rgba(6,182,212,.15);border-color:var(--accent-cyan)}
        .typing-dots{display:flex;gap:3px;padding:5px 0}
        .typing-dots span{width:6px;height:6px;background:var(--accent-cyan);border-radius:50%;animation:bounce 1.2s infinite}
        .typing-dots span:nth-child(2){animation-delay:.15s}
        .typing-dots span:nth-child(3){animation-delay:.3s}
        @keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}

        /* ═══ QUIZ ═══ */
        .quiz-setup{background:var(--bg-card);border:1px solid rgba(124,58,237,.15);border-radius:14px;padding:18px;text-align:center}
        .quiz-setup h3{font-family:'Orbitron',sans-serif;font-size:1rem;margin-bottom:4px}
        .quiz-modes{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin:12px 0}
        .quiz-mode-btn{padding:7px 18px;background:rgba(255,255,255,.03);border:1.5px solid rgba(6,182,212,.2);border-radius:12px;color:#cbd5e1;cursor:pointer;font-size:.78rem;transition:all .25s}
        .quiz-mode-btn:hover,.quiz-mode-btn.selected{background:rgba(6,182,212,.15);border-color:var(--accent-cyan);color:#fff}
        .btn-primary{padding:9px 30px;background:linear-gradient(135deg,var(--accent-cyan),var(--accent-purple));border:none;border-radius:30px;color:#fff;font-size:.82rem;font-weight:600;cursor:pointer;transition:all .3s}
        .btn-primary:hover{transform:translateY(-2px);box-shadow:0 6px 20px var(--glow-cyan)}
        .btn-primary:disabled{opacity:.5;pointer-events:none}
        .quiz-card{background:var(--bg-card);border:1.5px solid rgba(124,58,237,.2);border-radius:16px;padding:18px;margin-bottom:8px}
        .quiz-progress-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;font-size:.75rem}
        .quiz-bar{flex:1;height:3px;background:rgba(255,255,255,.08);border-radius:2px;margin:0 8px;overflow:hidden}
        .quiz-bar-fill{height:100%;background:linear-gradient(90deg,var(--accent-cyan),var(--accent-purple));border-radius:2px;transition:width .4s}
        .quiz-question{font-size:.9rem;font-weight:600;margin-bottom:12px;line-height:1.5}
        .quiz-option{padding:11px 14px;background:rgba(255,255,255,.03);border:1.5px solid rgba(255,255,255,.06);border-radius:12px;cursor:pointer;margin-bottom:5px;font-size:.82rem;transition:all .25s}
        .quiz-option:hover{background:rgba(6,182,212,.08);border-color:var(--accent-cyan)}
        .quiz-option.correct{background:rgba(16,185,129,.18)!important;border-color:var(--accent-emerald)!important}
        .quiz-option.wrong{background:rgba(239,68,68,.18)!important;border-color:#ef4444!important}
        .quiz-option.disabled{pointer-events:none;opacity:.7}
        .quiz-exp{background:rgba(255,255,255,.03);border-radius:10px;padding:12px;margin-top:8px;display:none;font-size:.78rem;line-height:1.6}
        .quiz-exp.show{display:block}
        .quiz-exp.ai-explain{background:rgba(6,182,212,.08);border:1px solid rgba(6,182,212,.2);animation:fadeIn .5s}
        .reinforce-section{margin-top:12px;padding:12px;background:rgba(124,58,237,.08);border:1px dashed rgba(124,58,237,.3);border-radius:12px;display:none}
        .reinforce-section.show{display:block;animation:fadeIn .5s}
        .reinforce-section h4{font-size:.8rem;color:var(--accent-cyan);margin-bottom:8px}
        .reinforce-question{font-weight:600;margin-bottom:8px;font-size:.85rem}
        .quiz-result{background:var(--bg-card);border:2px solid var(--accent-cyan);border-radius:18px;padding:24px;text-align:center}
        .result-score{font-family:'Orbitron',sans-serif;font-size:2.5rem;font-weight:900;background:linear-gradient(135deg,var(--accent-cyan),var(--accent-purple));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
        .result-detail{display:flex;justify-content:center;gap:16px;margin:14px 0;flex-wrap:wrap}
        .result-stat-num{font-size:1.3rem;font-weight:700;color:var(--accent-cyan)}
        .result-stat-label{font-size:.68rem;color:var(--text-secondary)}

        /* ═══ RECORDS ═══ */
        .record-card{background:var(--bg-card);border:1px solid rgba(255,255,255,.05);border-radius:12px;padding:10px 14px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px;font-size:.78rem}
        .record-score{font-family:'Orbitron',sans-serif;font-size:1rem;font-weight:700;color:var(--accent-cyan)}
        .btn-sm{padding:4px 10px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:14px;color:#cbd5e1;font-size:.68rem;cursor:pointer;transition:all .25s}
        .btn-sm:hover{background:rgba(239,68,68,.12);border-color:#ef4444;color:#ef4444}
        .empty-state{text-align:center;padding:24px;color:var(--text-secondary);font-size:.8rem}
        .review-content{display:none}
        .review-content.show{display:block}
        .review-toggle.open{color:var(--accent-emerald)!important}

        /* ═══ MODAL ═══ */
        .modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:9999;justify-content:center;align-items:center;padding:20px}
        .modal.active{display:flex}
        .modal-box{background:linear-gradient(145deg,#0f2847,#060d1a);border:2px solid var(--accent-cyan);border-radius:22px;max-width:550px;width:100%;max-height:80vh;overflow-y:auto;padding:24px 20px;position:relative;animation:modalIn .35s}
        @keyframes modalIn{from{transform:scale(.94) translateY(30px);opacity:0}to{transform:scale(1) translateY(0);opacity:1}}
        .modal-close{position:absolute;top:8px;right:14px;font-size:1.5rem;background:none;border:none;color:#64748b;cursor:pointer;z-index:2}
        .modal-close:hover{color:var(--accent-cyan)}
        .modal-sphere{width:80px;height:80px;border-radius:50%;margin:0 auto 10px;display:block;position:relative}
        .modal-sphere::after{content:'';position:absolute;top:16%;left:20%;width:26%;height:20%;border-radius:50%;background:radial-gradient(ellipse,rgba(255,255,255,.5),transparent 70%)}
        .detail-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:8px;margin:14px 0}
        .detail-card{background:rgba(124,58,237,.1);border:1px solid rgba(124,58,237,.2);border-radius:10px;padding:10px;text-align:center}
        .detail-card.accent{background:rgba(6,182,212,.1);border-color:rgba(6,182,212,.2)}
        .detail-label{font-size:.6rem;color:#64748b;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:3px}
        .detail-value{font-size:.9rem;font-weight:700}
        .fun-facts h4{font-size:.9rem;margin-bottom:10px;color:var(--accent-cyan)}
        .fact-item{background:rgba(255,255,255,.03);padding:8px 12px;border-radius:8px;margin-bottom:6px;border-left:3px solid var(--accent-purple);font-size:.78rem;line-height:1.6}
        .modal-knowledge{background:rgba(16,185,129,.06);border:1px solid rgba(16,185,129,.2);border-radius:10px;padding:10px 14px;margin-top:12px;font-size:.78rem;line-height:1.7;color:var(--accent-emerald)}

];

// Pluto data

window.addEventListener('mousemove',e=>{

    if(pct>20&&pct<80){leftPanel.style.width=pct+'%';resizeSim();}
});
window.addEventListener('mouseup',()=>{if(isResizing){isResizing=false;resizeHandle.classList.remove('active');document.body.style.userSelect=''}});

let showAsteroids=false,showComet=false;

// Self-rotation angles (radians per frame at speed=1)
let rotationAngles={};

// Asteroid belt particles (generated once)

function genAsteroids(){
    asteroidParticles=[];
    for(let i=0;i<200;i++){
        const angle=Math.random()*Math.PI*2;
        const minR=245,maxR=320; // between Mars (215) and Jupiter (355)
        const r=minR+Math.random()*(maxR-minR)+(Math.random()-.5)*15;
        asteroidParticles.push({angle,radius:r,size:.4+Math.random()*1.6,speed:.003+Math.random()*.012,opacity:.15+Math.random()*.35});
    }
}
genAsteroids();

// Comet state (Halley's Comet with elliptical orbit)
let cometAngle=0;

function initSimPlanets(){
    simPlanets=planetsData.map(p=>({
        ...p,angle:Math.random()*Math.PI*2,radius:p.orbitRadius,
        speed:p.orbitSpeed/60,visible:true
    }));
    rotationAngles={};
    planetsData.forEach(p=>rotationAngles[p.id]=Math.random()*Math.PI*2);
}

        ...plutoData,angle:simPlanets.length>0?simPlanets[0].angle-1.2:0,
        radius:plutoData.orbitRadius,speed:plutoData.orbitSpeed/60,visible:true
    };
}

initSimPlanets();

function resizeSim(){
    const rect=simCanvas.parentElement.getBoundingClientRect();
    simW=simCanvas.width=rect.width;
    simH=simCanvas.height=rect.height-90; // account for 3-row header
    cx=simW*SUN_X_FACTOR;cy=simH/2;
}
resizeSim();window.addEventListener('resize',()=>{resizeSim();drawSim()});

function worldToScreen(wx,wy){return{x:(wx-panX)*zoom+cx,y:(wy-panY)*zoom+cy}}
function getPlanetScreenRadius(realSize){return Math.max(2,BASE_PLANET_RADIUS*realSize*zoom)}

function drawStars(){
    // Twinkling 2D starfield with depth
    const seed=42;
    for(let i=0;i<180;i++){
        const sx=(i*7919+seed*31)%simW,sy=(i*6271+seed*17)%simH;
        const twinkle=.4+.6*Math.abs(Math.sin(Date.now()*.001+i*.7+Math.sin(i*3.1)*2));
        const depth=(i%3)+1;
        const size=depth===3?2:1;
        simCtx.fillStyle=`rgba(255,255,255,${(.08+.15*twinkle)/depth})`;
        simCtx.beginPath();simCtx.arc(sx,sy,size*.6,0,Math.PI*2);simCtx.fill();
    }
}

function drawSun(){
    const pos=worldToScreen(0,0);
    const sunR=Math.min(BASE_PLANET_RADIUS*24*zoom,75*zoom);
    // Animated corona
    const coronaPhase=Date.now()*.0005;
    const glowR=sunR*(3.2+.3*Math.sin(coronaPhase*2));
    const grad=simCtx.createRadialGradient(pos.x,pos.y,sunR*.15,pos.x,pos.y,glowR);
    grad.addColorStop(0,'rgba(255,240,180,1)');
    grad.addColorStop(.12,'rgba(255,200,60,.9)');
    grad.addColorStop(.35,'rgba(255,150,20,.4)');
    grad.addColorStop(.65,'rgba(255,100,10,.07)');
    grad.addColorStop(1,'transparent');
    simCtx.beginPath();simCtx.arc(pos.x,pos.y,glowR,0,Math.PI*2);
    simCtx.fillStyle=grad;simCtx.fill();
    // Sun body
    simCtx.beginPath();simCtx.arc(pos.x,pos.y,sunR,0,Math.PI*2);
    const sg=simCtx.createRadialGradient(pos.x-sunR*.2,pos.y-sunR*.2,sunR*.08,pos.x,pos.y,sunR);
    sg.addColorStop(0,'#fff8c0');sg.addColorStop(.35,'#ffb800');sg.addColorStop(1,'#e87800');
    simCtx.fillStyle=sg;simCtx.fill();
    // Sun label
    if(showLabels){
        simCtx.fillStyle='rgba(255,240,180,.9)';simCtx.font=`bold ${Math.max(8,10*zoom)}px "Noto Sans SC"`;
        simCtx.textAlign='center';simCtx.fillText('太阳',pos.x,pos.y-sunR-8);
    }
    // Knowledge tag for sun
    if(showKnowledge){
        simCtx.fillStyle='rgba(6,182,212,.55)';simCtx.font=`${Math.max(6,7*zoom)}px "Noto Sans SC"`;
        simCtx.fillText('恒星·中心',pos.x,pos.y-sunR-20);
    }
}

function drawOrbit(radius,color,dashed){
    const pos=worldToScreen(0,0);const r=radius*zoom;
    simCtx.beginPath();simCtx.arc(pos.x,pos.y,r,0,Math.PI*2);
    simCtx.strokeStyle=color||'rgba(255,255,255,.06)';simCtx.lineWidth=.8;
    if(dashed)simCtx.setLineDash([3,6]);else simCtx.setLineDash([]);
    simCtx.stroke();simCtx.setLineDash([]);
}

function drawSaturnRing(pos,r,angle){
    // Elliptical ring
    const ringInner=r*1.4,ringOuter=r*2.1;
    simCtx.save();
    simCtx.translate(pos.x,pos.y);
    simCtx.rotate(angle);
    simCtx.scale(1,.35);
    simCtx.beginPath();simCtx.arc(0,0,ringOuter,0,Math.PI*2);
    const rg=simCtx.createRadialGradient(0,0,ringInner,0,0,ringOuter);
    rg.addColorStop(0,'transparent');
    rg.addColorStop(.3,'rgba(251,191,36,.15)');
    rg.addColorStop(.5,'rgba(251,191,36,.45)');
    rg.addColorStop(.7,'rgba(210,160,30,.3)');
    rg.addColorStop(1,'transparent');
    simCtx.fillStyle=rg;simCtx.fill();
    simCtx.strokeStyle='rgba(251,191,36,.5)';simCtx.lineWidth=.5;simCtx.stroke();
    simCtx.restore();
}

function drawCometTrail(cx,cy,angle,len){
    // Draw comet trail
    const trailLen=len*zoom;
    simCtx.save();
    simCtx.globalAlpha=.6;
    const grad=simCtx.createLinearGradient(cx,cy,cx-Math.cos(angle)*trailLen,cy-Math.sin(angle)*trailLen);
    grad.addColorStop(0,'rgba(200,220,255,.7)');
    grad.addColorStop(.5,'rgba(100,160,255,.3)');
    grad.addColorStop(1,'transparent');
    simCtx.beginPath();
    simCtx.moveTo(cx,cy);
    simCtx.lineTo(cx-Math.cos(angle)*trailLen*.3,cy-Math.sin(angle)*trailLen*.3);
    simCtx.lineTo(cx-Math.cos(angle+.3)*trailLen*.7,cy-Math.sin(angle+.3)*trailLen*.7);
    simCtx.lineTo(cx-Math.cos(angle)*trailLen,cy-Math.sin(angle)*trailLen);
    simCtx.fillStyle=grad;simCtx.fill();
    simCtx.restore();
    // Comet head
    const grad2=simCtx.createRadialGradient(cx,cy,0,cx,cy,4*zoom);
    grad2.addColorStop(0,'rgba(255,255,255,.9)');
    grad2.addColorStop(.5,'rgba(180,210,255,.5)');
    grad2.addColorStop(1,'transparent');
    simCtx.beginPath();simCtx.arc(cx,cy,4*zoom,0,Math.PI*2);
    simCtx.fillStyle=grad2;simCtx.fill();
}

function drawAsteroidBelt(){
    asteroidParticles.forEach(a=>{
        a.angle+=a.speed*(simPaused?0:speed);
        const ax=Math.cos(a.angle)*a.radius,ay=Math.sin(a.angle)*a.radius;
        const pos=worldToScreen(ax,ay);
        if(pos.x<0||pos.x>simW||pos.y<0||pos.y>simH)return;
        simCtx.fillStyle=`rgba(180,180,190,${a.opacity})`;
        simCtx.beginPath();simCtx.arc(pos.x,pos.y,a.size*zoom*.5,0,Math.PI*2);simCtx.fill();
    });
}

function drawSim(){
    simCtx.fillStyle='#050e1a';simCtx.fillRect(0,0,simW,simH);
    drawStars();

    // Draw orbits
    if(showOrbits){
        simPlanets.forEach(p=>{if(p.visible)drawOrbit(p.radius)});
        if(showPluto)drawOrbit(plutoData.orbitRadius,'rgba(255,255,255,.04)',true);
    }

    // Asteroid belt
    if(showAsteroids)drawAsteroidBelt();

    drawSun();

    // Update and draw planets
    simPlanets.forEach(p=>{
        if(!p.visible)return;
        if(!simPaused){
            p.angle+=p.speed*speed;
            rotationAngles[p.id]=(rotationAngles[p.id]||0)+p.speed*speed*8;
        }
        const px=Math.cos(p.angle)*p.radius,py=Math.sin(p.angle)*p.radius;
        const pos=worldToScreen(px,py);
        const r=getPlanetScreenRadius(p.realSize);

        // Glow
        simCtx.beginPath();simCtx.arc(pos.x,pos.y,r*1.6,0,Math.PI*2);
        simCtx.fillStyle=`rgba(${hexToRgb(p.color)},.08)`;simCtx.fill();

        // Body with rotation hint (surface features)
        simCtx.save();
        simCtx.translate(pos.x,pos.y);
        simCtx.rotate(rotationAngles[p.id]||0);
        simCtx.beginPath();simCtx.arc(0,0,r,0,Math.PI*2);

        // Special surface features for Jupiter (bands)
        if(p.id==='jupiter'){
            const rgb=hexToRgbArr(p.color);
            const pg=simCtx.createLinearGradient(0,-r,0,r);
            pg.addColorStop(0,`rgba(${Math.min(255,rgb[0]+60)},${Math.min(255,rgb[1]+40)},${Math.min(255,rgb[2]+10)},1)`);
            pg.addColorStop(.2,`rgba(${rgb[0]},${rgb[1]},${rgb[2]},1)`);
            pg.addColorStop(.4,`rgba(${Math.min(255,rgb[0]+30)},${Math.min(255,rgb[1]+20)},${rgb[2]},.9)`);
            pg.addColorStop(.6,`rgba(${rgb[0]},${rgb[1]},${rgb[2]},1)`);
            pg.addColorStop(.85,`rgba(${Math.min(255,rgb[0]+40)},${Math.min(255,rgb[1]+30)},${Math.max(0,rgb[2]-20)},.9)`);
            pg.addColorStop(1,`rgba(${Math.max(0,rgb[0]-40)},${Math.max(0,rgb[1]-40)},${Math.max(0,rgb[2]-40)},1)`);
            simCtx.fillStyle=pg;
        }else{
            const rgb=hexToRgbArr(p.color);
            const pg=simCtx.createRadialGradient(-r*.25,-r*.25,0,0,0,r);
            pg.addColorStop(0,`rgba(${Math.min(255,rgb[0]+70)},${Math.min(255,rgb[1]+70)},${Math.min(255,rgb[2]+70)},1)`);
            pg.addColorStop(.5,`rgba(${rgb[0]},${rgb[1]},${rgb[2]},1)`);
            pg.addColorStop(1,`rgba(${Math.max(0,rgb[0]-50)},${Math.max(0,rgb[1]-50)},${Math.max(0,rgb[2]-50)},1)`);
            simCtx.fillStyle=pg;
        }
        simCtx.fill();
        simCtx.restore();

        // Saturn ring
        if(p.hasRing)drawSaturnRing(pos,r,Math.PI/6);

        // Earth-Moon system
        if(p.id==='earth'){
            if(!simPaused)moonAngle+=.03*speed;
            const moonDist=r*4;
            const mx=pos.x+Math.cos(moonAngle)*moonDist,my=pos.y+Math.sin(moonAngle)*moonDist;
            const moonR=Math.max(1.5,r*.25);
            simCtx.beginPath();simCtx.arc(mx,my,moonR,0,Math.PI*2);
            simCtx.fillStyle='rgba(200,200,200,.9)';simCtx.fill();
            // Moon orbit
            simCtx.beginPath();simCtx.arc(pos.x,pos.y,moonDist,0,Math.PI*2);
            simCtx.strokeStyle='rgba(255,255,255,.04)';simCtx.lineWidth=.5;simCtx.stroke();
            if(showKnowledge){
                simCtx.fillStyle='rgba(16,185,129,.5)';
                simCtx.font=`${Math.max(5,6*zoom)}px "Noto Sans SC"`;simCtx.textAlign='center';
                simCtx.fillText('月球',mx,my-moonR-4);
            }
        }

        // Planet label
        if(showLabels){
            simCtx.fillStyle='rgba(255,255,255,.65)';simCtx.font=`${Math.max(7,9*zoom)}px "Noto Sans SC"`;
            simCtx.textAlign='center';simCtx.fillText(p.name,pos.x,pos.y-r-7);
        }

        // Knowledge annotation (textbook-aligned)
        if(showKnowledge){
            const knowTexts={mercury:'公转88天',venus:'逆向自转',earth:'昼夜·四季',mars:'24.6h自转',jupiter:'气态·大红斑',saturn:'光环·低密度',uranus:'躺着转98°',neptune:'风速最快'};
            simCtx.fillStyle='rgba(6,182,212,.45)';
            simCtx.font=`${Math.max(5,6.5*zoom)}px "Noto Sans SC"`;
            simCtx.fillText(knowTexts[p.id]||'',pos.x,pos.y-r-18);
        }

        // Eclipse solar simulation
        if(eclipseMode==='solar'&&p.id==='earth'){
            const mx=pos.x+Math.cos(moonAngle)*r*4,my=pos.y+Math.sin(moonAngle)*r*4;
            const distToSun=Math.hypot(mx-0,my-0);
            const moonSunAngle=Math.atan2(my-0,mx-0);
            const earthSunAngle=Math.atan2(pos.y-0,pos.x-0);
            const angleDiff=Math.abs(moonSunAngle-earthSunAngle);
            if(angleDiff<.08){
                // Dark overlay on part of the screen
                const sunPos=worldToScreen(0,0);
                const shadowR=Math.min(BASE_PLANET_RADIUS*24*zoom,75*zoom)*2.5;
                simCtx.fillStyle='rgba(0,0,0,.3)';
                simCtx.beginPath();simCtx.arc(sunPos.x,sunPos.y,shadowR,0,Math.PI*2);simCtx.fill();
            }
        }

        p._screenPos=pos;p._screenR=r;
    });

    // Pluto
    if(showPluto){
        const plObj=getPlutoSimObj();
        plObj.angle+=(simPaused?0:plObj.speed*speed);
        const px=Math.cos(plObj.angle)*plObj.radius,py=Math.sin(plObj.angle)*plObj.radius;
        const pos=worldToScreen(px,py);
        const r=getPlanetScreenRadius(plObj.realSize);
        simCtx.beginPath();simCtx.arc(pos.x,pos.y,r,0,Math.PI*2);
        const pg=simCtx.createRadialGradient(pos.x-r*.25,pos.y-r*.25,0,pos.x,pos.y,r);
        pg.addColorStop(0,'rgba(250,220,190,1)');pg.addColorStop(.5,'rgba(180,140,100,1)');pg.addColorStop(1,'rgba(120,100,70,1)');
        simCtx.fillStyle=pg;simCtx.fill();
        if(showLabels){
            simCtx.fillStyle='rgba(255,255,255,.45)';simCtx.font=`${Math.max(6,8*zoom)}px "Noto Sans SC"`;
            simCtx.textAlign='center';simCtx.fillText('冥王星',pos.x,pos.y-r-5);
        }
        if(showKnowledge){
            simCtx.fillStyle='rgba(255,255,255,.25)';simCtx.font=`${Math.max(5,6*zoom)}px "Noto Sans SC"`;
            simCtx.textAlign='center';simCtx.fillText('矮行星',pos.x,pos.y-r-15);
        }
    }

    // Halley's Comet
    if(showComet&&!simPaused){
        cometAngle+=.0006*speed;
        // Elliptical orbit: r = a(1-e²)/(1+e*cos(θ))
        const e=cometOrbit.e,a=cometOrbit.a;
        const theta=cometAngle-cometOrbit.periAngle;
        const rOrbit=a*(1-e*e)/(1+e*Math.cos(theta));
        const cxPos=Math.cos(cometAngle)*rOrbit,cyPos=Math.sin(cometAngle)*rOrbit;
        const pos=worldToScreen(cxPos,cyPos);
        if(pos.x>0&&pos.x<simW&&pos.y>0&&pos.y<simH){
            // Direction away from sun
            const dirAway=Math.atan2(pos.y-worldToScreen(0,0).y,pos.x-worldToScreen(0,0).x);
            drawCometTrail(pos.x,pos.y,dirAway,35);
            if(showLabels){
                simCtx.fillStyle='rgba(255,255,255,.5)';simCtx.font=`${Math.max(6,7*zoom)}px "Noto Sans SC"`;
                simCtx.textAlign='center';simCtx.fillText('☄哈雷',pos.x,pos.y-10);
            }
        }
    }

    // Update comet angle loop
    if(cometAngle>Math.PI*2){cometAngle-=Math.PI*2}

    simTime++;
}

function hexToRgb(h){const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return`${r},${g},${b}`}
function hexToRgbArr(h){return[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)]}

function findPlanetAt(sx,sy){
    // Check regular planets
    for(let i=simPlanets.length-1;i>=0;i--){
        const p=simPlanets[i];if(!p.visible||!p._screenPos)continue;
        if(Math.hypot(sx-p._screenPos.x,sy-p._screenPos.y)<p._screenR+8)return p;
    }
    // Check Pluto
    if(showPluto){
        const plObj=getPlutoSimObj();
        const px=Math.cos(plObj.angle)*plObj.radius,py=Math.sin(plObj.angle)*plObj.radius;
        const pos=worldToScreen(px,py);
        const r=getPlanetScreenRadius(plObj.realSize);
        if(Math.hypot(sx-pos.x,sy-pos.y)<r+8)return plObj;
    }
    return null;
}

function showInfoPanel(planet){
    const panel=document.getElementById('infoPanel');
    const textbookNote=planet.textbook?`<div style="margin-top:6px;padding:6px 8px;background:rgba(16,185,129,.08);border-radius:6px;border-left:2px solid var(--accent-emerald);font-size:.68rem;color:var(--accent-emerald)">📖 课本知识：${planet.textbook}</div>`:'';
    document.getElementById('infoContent').innerHTML=`<div style="display:flex;justify-content:space-between;align-items:center"><strong style="color:${planet.color}">${planet.name} ${planet.nameEn}</strong><button class="info-voice-btn" onclick="readPlanetInfo('${planet.id}')">🔊 朗读</button></div><div style="margin-top:5px"><div class="info-row"><span class="info-label">类型</span><span class="info-val">${planet.type}</span></div><div class="info-row"><span class="info-label">直径</span><span class="info-val">${planet.diameter}</span></div><div class="info-row"><span class="info-label">距太阳</span><span class="info-val">${planet.distance}</span></div><div class="info-row"><span class="info-label">一天</span><span class="info-val">${planet.dayLength}</span></div><div class="info-row"><span class="info-label">一年</span><span class="info-val">${planet.yearLength}</span></div></div>${textbookNote}`;
    panel.style.display='block';
}
function readPlanetInfo(id){
    const p=planetsData.find(x=>x.id===id)||(id==='pluto'?plutoData:null);
    if(!p)return;
    const text=`${p.name}，${p.type}，直径${p.diameter}，距太阳${p.distance}，温度${p.temperature}。${p.description}`;
    speakText(text);
}
document.getElementById('closeInfo').addEventListener('click',()=>document.getElementById('infoPanel').style.display='none');

// Mouse interaction
simCanvas.addEventListener('mousedown',e=>{isPanning=true;lastMouse={x:e.clientX,y:e.clientY};simCanvas.style.cursor='grabbing'});
window.addEventListener('mouseup',()=>{isPanning=false;simCanvas.style.cursor='grab'});
window.addEventListener('mousemove',e=>{
    if(isPanning){panX-=(e.clientX-lastMouse.x)/zoom;panY-=(e.clientY-lastMouse.y)/zoom;lastMouse={x:e.clientX,y:e.clientY}}
    if(isResizing)return;
    const rect=simCanvas.getBoundingClientRect();
    const hp=findPlanetAt(e.clientX-rect.left,e.clientY-rect.top);
    simCanvas.style.cursor=hp?'pointer':(isPanning?'grabbing':'grab');
    const tt=document.getElementById('planetTooltip');
    if(hp){tt.style.display='block';tt.style.left=(e.clientX+14)+'px';tt.style.top=(e.clientY-38)+'px';tt.innerHTML=`<b style="color:${hp.color}">${hp.name}</b> ${hp.nameEn}<br><span style="font-size:.65rem">${hp.type} · ${hp.diameter}</span>`}
    else tt.style.display='none';
});
simCanvas.addEventListener('click',e=>{
    const rect=simCanvas.getBoundingClientRect();
    const hp=findPlanetAt(e.clientX-rect.left,e.clientY-rect.top);
    if(hp){showInfoPanel(hp);openPlanetModal(hp.id)}
});
simCanvas.addEventListener('wheel',e=>{e.preventDefault();zoom=Math.max(.15,Math.min(4,zoom*(e.deltaY>0?.9:1.1)))});
simCanvas.addEventListener('touchstart',e=>{if(e.touches.length===1){isPanning=true;lastMouse={x:e.touches[0].clientX,y:e.touches[0].clientY}}});
simCanvas.addEventListener('touchmove',e=>{if(isPanning){panX-=(e.touches[0].clientX-lastMouse.x)/zoom;panY-=(e.touches[0].clientY-lastMouse.y)/zoom;lastMouse={x:e.touches[0].clientX,y:e.touches[0].clientY}}});
simCanvas.addEventListener('touchend',()=>{isPanning=false});

// Layer toggle buttons
document.querySelectorAll('.sim-btn[data-layer]').forEach(b=>{
    b.addEventListener('click',function(){
        const layer=this.dataset.layer;

// Focus select
document.getElementById('focusSelect').addEventListener('change',function(){
    focusPlanetId=this.value;
    if(!focusPlanetId){panX=0;panY=0;zoom=1;initSimPlanets();return}
    // Find the planet and center on it
    let targetPlanet;
    if(focusPlanetId==='pluto'){
        const plObj=getPlutoSimObj();
        targetPlanet={px:Math.cos(plObj.angle)*plObj.radius,py:Math.sin(plObj.angle)*plObj.radius};
    }else{
        const p=simPlanets.find(x=>x.id===focusPlanetId);
        if(p)targetPlanet={px:Math.cos(p.angle)*p.radius,py:Math.sin(p.angle)*p.radius};
    }
    if(targetPlanet){
        panX=targetPlanet.px-simW*.08/zoom;
        panY=targetPlanet.py;
        zoom=1.5;
    }
    this.value=''; // reset dropdown
});

const seasons=['spring','summer','autumn','winter'],seasonNames=['🌸 春','☀️ 夏','🍂 秋','❄️ 冬'];
function updateDateTime(){

// ═══════════════ DEEPSEEK API ═══════════════
async function callDeepSeek(userMsg,systemPrompt){
    if(!dsApiKey){return null}
    try{
        const resp=await fetch('https://api.deepseek.com/chat/completions',{
            method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${dsApiKey}`},
            body:JSON.stringify({model:'deepseek-chat',messages:[{role:'system',content:systemPrompt},{role:'user',content:userMsg}],temperature:.7,max_tokens:800,stream:false})
        });
        if(!resp.ok)return null;
        const data=await resp.json();
        return data.choices?.[0]?.message?.content||null;
    }catch(e){return null}
}

const fallbackKB=[
    {kw:['你好','hi','hello','嗨'],resp:['你好！我是小星，由DeepSeek驱动 🌟 问任何太阳系问题吧！']},
    {kw:['谢谢','感谢'],resp:['不客气！继续探索宇宙吧 😊']},
];

function fallbackResponse(q){
    const lq=q.toLowerCase();
    for(const r of fallbackKB){if(r.kw.some(k=>lq.includes(k))){return r.resp[Math.floor(Math.random()*r.resp.length)]}}
    const p=planetsData.find(p=>lq.includes(p.name)||lq.includes(p.nameEn.toLowerCase())||lq.includes(p.id));
    if(p){return `${p.name}是${p.type}，直径${p.diameter}，距太阳${p.distance}，${p.moons}颗卫星，温度${p.temperature}。想了解更多可以开启DeepSeek API～`}
    return '可以问我具体行星哦，如"木星有多大"。也请配置DeepSeek API Key获得更智能的回答～'
}

async function sendMessage(){
    const inp=document.getElementById('chatInput');const msg=inp.value.trim();if(!msg)return;
    addChatMsg('user',msg);inp.value='';showTyping();setAvatarThinking();
    let resp;
    if(dsApiKey){
        const recentHistory=chatHistory.slice(-6).filter(m=>m.role==='user'||m.role==='assistant');
        const context=recentHistory.length>1?`对话历史：\n${recentHistory.map(m=>`[${m.role==='user'?'用户':'小星'}] ${m.content}`).join('\n')}\n\n用户最新问题：${msg}`:msg;
        resp=await callDeepSeek(context,SYSTEM_PROMPT);
    }
    if(!resp||resp.trim()==='')resp=fallbackResponse(msg);
    hideTyping();addChatMsg('assistant',resp);setAvatarSpeaking();
    if(speakerOn)speakText(resp);setTimeout(setAvatarIdle,2500);
}

let speakerOn=true;const btnSpeaker=document.getElementById('btnSpeaker');
function speakText(text){
    if(!speakerOn)return;
    speechSynthesis.cancel();
    const voices=speechSynthesis.getVoices();
    const preferred=['Tingting','Sin-Ji','Microsoft Hanhan','Microsoft Xiaoxiao','zh-CN'];
    let voice=null;
    for(const p of preferred){voice=voices.find(v=>v.name.includes(p)||v.lang.includes('zh-CN'));if(voice)break}
    if(!voice)voice=voices.find(v=>v.lang.includes('zh'))||voices[0];
    const u=new SpeechSynthesisUtterance(text);u.voice=voice;u.lang='zh-CN';u.rate=.95;u.pitch=1.05;
    if(voices.length===0){speechSynthesis.onvoiceschanged=()=>{const v2=getVoice();u.voice=v2;speechSynthesis.speak(u)};return}
    speechSynthesis.speak(u);
}
function getVoice(){const v=speechSynthesis.getVoices();return v.find(x=>x.name.includes('Tingting')||x.lang.includes('zh-CN'))||v.find(x=>x.lang.includes('zh'))||v[0]}

let quizState={total:5,current:0,answers:[],questions:[],answered:false,reinforceCount:0};
document.querySelectorAll('.quiz-mode-btn').forEach(b=>b.addEventListener('click',()=>{document.querySelectorAll('.quiz-mode-btn').forEach(x=>x.classList.remove('selected'));b.classList.add('selected');quizState.total=parseInt(b.dataset.count)}));
document.getElementById('startQuizBtn').addEventListener('click',startQuiz);

function startQuiz(){
    const shuffled=[...quizQuestions].sort(()=>Math.random()-.5);
    quizState={total:Math.min(quizState.total,shuffled.length),current:0,answers:[],questions:shuffled.slice(0,quizState.total),answered:false,reinforceCount:0};
    document.getElementById('quizSetup').style.display='none';document.getElementById('quizResult').innerHTML='';showQuestion();
}
function showQuestion(){
    const q=quizState.questions[quizState.current];const pct=(quizState.current/quizState.total)*100;
    document.getElementById('quizQuestion').innerHTML=`<div class="quiz-card"><div class="quiz-progress-row"><span>${quizState.current+1}/${quizState.total}</span><div class="quiz-bar"><div class="quiz-bar-fill" style="width:${pct}%"></div></div><span style="color:var(--accent-cyan)">${Math.round(pct)}%</span></div><div class="quiz-question">${q.q}</div>${q.opts.map((o,i)=>`<div class="quiz-option" data-idx="${i}">${'ABCD'[i]}. ${o}</div>`).join('')}<div class="quiz-exp" id="quizExp"></div><div class="reinforce-section" id="reinforceSection"><h4>📚 AI 详细解析 + 强化练习</h4><div id="reinforceContent"></div></div><div id="quizNext" style="text-align:center;margin-top:10px;display:none"><button class="btn-primary" onclick="nextQ()" style="font-size:.78rem;padding:7px 24px">${quizState.current<quizState.total-1?'下一题 ▶':'查看结果 📊'}</button></div></div>`;
    quizState.answered=false;
    document.querySelectorAll('.quiz-option').forEach(o=>o.addEventListener('click',()=>answerQ(parseInt(o.dataset.idx))));
}

async function answerQ(idx){
    if(quizState.answered)return;quizState.answered=true;
    const q=quizState.questions[quizState.current],correct=idx===q.ans;
    quizState.answers.push({correct,userAnswer:idx,correctAnswer:q.ans});
    const opts=document.querySelectorAll('.quiz-option');opts.forEach(o=>o.classList.add('disabled'));
    opts[q.ans].classList.add('correct');
    if(!correct)opts[idx].classList.add('wrong');
    const exp=document.getElementById('quizExp');exp.innerHTML=`${correct?'✅ 回答正确！':'❌ 回答错误。'} ${q.exp}`;exp.classList.add('show');
    document.getElementById('quizNext').style.display='block';

    if(!correct){
        const reinSection=document.getElementById('reinforceSection');
        const reinContent=document.getElementById('reinforceContent');
        reinSection.classList.add('show');
        reinContent.innerHTML='<div class="typing-dots"><span></span><span></span><span></span></div><span style="font-size:.75rem;color:var(--text-secondary)"> AI 正在生成讲解...</span>';

        if(dsApiKey){
            const prompt=`用户刚刚答错了这道天文题：\n题目：${q.q}\n选项：${q.opts.join('、')}\n正确答案：${q.opts[q.ans]}\n用户选的：${q.opts[idx]}\n\n请做两件事：\n1. 用通俗语言讲解为什么正确答案是${q.opts[q.ans]}，以及背后的天文知识（80字以内）\n2. 出一道和"${q.topic}"概念相关的新单选题，格式为 JSON: {"question":"题目","options":["A","B","C","D"],"answer":0}\n\n请按以下格式回复：\n【讲解】你的讲解内容\n【新题】JSON`;
            const aiResp=await callDeepSeek(prompt,'你是天文老师，帮助学生学习。回复简洁，讲解不超过80字。');
            if(aiResp){
                const explainMatch=aiResp.match(/【讲解】([\s\S]*?)(?:【新题】|$)/);
                const quizMatch=aiResp.match(/【新题】([\s\S]*)/);
                let explainText=explainMatch?explainMatch[1].trim():'';
                let reinforcedHTML='';
                if(quizMatch){
                    try{
                        const jsonStr=quizMatch[1].trim().replace(/```json|```/g,'').trim();
                        const rQuiz=JSON.parse(jsonStr);
                        window._reinforceQuiz=rQuiz;
                        reinforcedHTML=`<div class="reinforce-question">🔁 强化题：${rQuiz.question}</div>${rQuiz.options.map((o,i)=>`<div class="quiz-option reinforce-opt" data-r-idx="${i}">${'ABCD'[i]}. ${o}</div>`).join('')}<div class="quiz-exp" id="reinforceExp" style="margin-top:6px"></div>`;
                    }catch(e){reinforcedHTML=''}
                }
                reinContent.innerHTML=`<p style="font-size:.78rem;line-height:1.7;margin-bottom:8px;color:#cbd5e1"><span style="color:var(--accent-cyan)">🤖 AI讲解：</span>${explainText||aiResp.substring(0,200)}</p>${reinforcedHTML}`;
                setTimeout(()=>{
                    document.querySelectorAll('.reinforce-opt').forEach(o=>o.addEventListener('click',function(){
                        if(this.classList.contains('disabled'))return;
                        const rIdx=parseInt(this.dataset.rIdx);
                        const rExp=document.getElementById('reinforceExp');
                        document.querySelectorAll('.reinforce-opt').forEach(x=>x.classList.add('disabled'));
                        if(rIdx===window._reinforceQuiz.answer){
                            this.classList.add('correct');
                            rExp.innerHTML='✅ 正确！你掌握了这个概念！';rExp.classList.add('show');
                        }else{
                            this.classList.add('wrong');
                            document.querySelector(`.reinforce-opt[data-r-idx="${window._reinforceQuiz.answer}"]`).classList.add('correct');
                            rExp.innerHTML=`需要复习一下～正确答案是 ${'ABCD'[window._reinforceQuiz.answer]}`;rExp.classList.add('show');
                        }
                    }));
                },100);
            }else{
                reinContent.innerHTML=`<p style="font-size:.78rem;line-height:1.7;color:#cbd5e1"><span style="color:var(--accent-cyan)">📖 知识点：</span>${q.exp}</p>`;
            }
        }else{
            reinContent.innerHTML=`<p style="font-size:.78rem;line-height:1.7;color:#cbd5e1"><span style="color:var(--accent-cyan)">💡 提示：</span>填入 DeepSeek API Key 可获取 AI 详细讲解和针对性强化练习题。</p><p style="font-size:.75rem;color:var(--text-secondary)">${q.exp}</p>`;
        }
    }
}

function nextQ(){quizState.current<quizState.total-1?(quizState.current++,showQuestion()):showResult()}
async function showResult(){
    const correct=quizState.answers.filter(a=>a.correct).length,score=Math.round(correct/quizState.total*100);
    let grade,emoji;
    if(score>=90){grade='天文大师！🏆';emoji='🌟'}else if(score>=70){grade='很不错！👍';emoji='👏'}else if(score>=50){grade='继续加油 📚';emoji='📖'}else{grade='多学习再挑战 🚀';emoji='💪'}
    const wrongTopics=[...new Set(quizState.answers.filter(a=>!a.correct).map((_,i)=>quizState.questions[i].topic))];
    const wrongTopicStr=wrongTopics.length?`薄弱环节：${wrongTopics.join('、')}`:'全部正确，非常棒！';
    document.getElementById('quizQuestion').innerHTML='';
    document.getElementById('quizResult').innerHTML=`<div class="quiz-result"><div style="font-size:2rem">${emoji}</div><div class="result-score">${score}<span style="font-size:.85rem;color:var(--text-secondary)">分</span></div><div style="margin:6px 0">${grade}</div><div class="result-detail"><div><div class="result-stat-num">${quizState.total}</div><div class="result-stat-label">总题</div></div><div><div class="result-stat-num" style="color:var(--accent-emerald)">${correct}</div><div class="result-stat-label">正确</div></div><div><div class="result-stat-num" style="color:#ef4444">${quizState.total-correct}</div><div class="result-stat-label">错误</div></div></div><div style="font-size:.78rem;color:var(--text-secondary);margin:10px 0">${wrongTopicStr}</div><div id="aiReviewBox" style="margin-top:12px;padding:14px;background:rgba(124,58,237,.08);border:1px solid rgba(124,58,237,.2);border-radius:12px;text-align:left;min-height:40px"><div class="typing-dots"><span></span><span></span><span></span></div><span style="font-size:.75rem;color:var(--text-secondary)"> AI正在生成点评...</span></div><button class="btn-primary" onclick="resetQuiz()" style="font-size:.78rem;margin-top:12px">🔄 再来一次</button></div>`;
    saveQR(score,correct,'');
    let aiReview='';
    if(dsApiKey){
        const wrongDetails=quizState.answers.filter(a=>!a.correct).map((a,i)=>{
            const q=quizState.questions[i];return `题${i+1}：${q.q}，正确答案：${q.opts[q.ans]}，用户答案：${q.opts[a.userAnswer]}，知识点：${q.topic}`;
        }).join('\n');
        const prompt=`用户刚完成一次天文知识测验：\n总分：${score}分（${quizState.total}题对${correct}题）\n${wrongDetails||'全部正确'}\n\n请给出50字以内的精简点评和1-2条针对性学习建议（提及具体知识点）。格式：【点评】xxx【建议】xxx`;
        const resp=await callDeepSeek(prompt,'你是天文老师，点评测验结果。精简，50字以内。');
        if(resp){aiReview=resp}
    }
    if(!aiReview){
        if(score>=80)aiReview='🎉 表现优秀！你对太阳系行星知识掌握得很好，继续保持好奇心，多多探索天文奥秘吧！';
        else if(score>=60)aiReview='👍 不错的基础！建议重点复习行星大小分类和气态/岩石行星的区别，可以在模拟太阳系中多看行星详情。';
        else aiReview='📚 加油！建议从八大行星的基本分类入手——岩石行星（水金地火）和气态/冰巨星（木土天海），多观察左栏模拟太阳系中行星的轨道和大小。';
    }
    document.getElementById('aiReviewBox').innerHTML=`<div style="font-size:.8rem;line-height:1.7;color:#cbd5e1"><span style="color:var(--accent-cyan);font-weight:600">🤖 智能点评：</span>${aiReview.replace(/\n/g,'<br>')}</div>`;
    updateQRReview(aiReview);
}
function resetQuiz(){quizState={total:quizState.total,current:0,answers:[],questions:[],answered:false,reinforceCount:0};document.getElementById('quizSetup').style.display='block';document.getElementById('quizQuestion').innerHTML='';document.getElementById('quizResult').innerHTML=''}
function saveQR(score,correct,review){
    const r=JSON.parse(localStorage.getItem('solar_q')||'[]');
    r.unshift({id:Date.now(),date:new Date().toLocaleString(),total:quizState.total,correct,score,review,questions:quizState.questions.map(q=>({q:q.q,topic:q.topic}))});
    if(r.length>50)r.length=50;localStorage.setItem('solar_q',JSON.stringify(r));
}
function updateQRReview(review){
    const r=JSON.parse(localStorage.getItem('solar_q')||'[]');
    if(r.length>0){r[0].review=review;localStorage.setItem('solar_q',JSON.stringify(r))}
}

// ═══════════════ RECORDS ═══════════════
function renderRecords(){
    const qE=document.getElementById('quizRecords'),qR=JSON.parse(localStorage.getItem('solar_q')||'[]');
    qE.innerHTML=qR.length===0?'<div class="empty-state">📝 暂无测验记录</div>':qR.map(r=>`<div class="record-card" style="flex-direction:column;align-items:flex-start"><div style="display:flex;justify-content:space-between;align-items:center;width:100%"><div><div style="font-size:.65rem;color:#64748b">${r.date}</div><div>${r.total}题·正确${r.correct}题</div></div><div class="record-score" style="color:${r.score>=80?'var(--accent-emerald)':r.score>=60?'var(--accent-amber)':'#ef4444'}">${r.score}分</div><button class="btn-sm" onclick="delQR(${r.id})">删</button></div>${r.review?`<div class="review-toggle" onclick="this.nextElementSibling.classList.toggle('show');this.classList.toggle('open')" style="cursor:pointer;font-size:.68rem;color:var(--accent-cyan);margin-top:4px;user-select:none">▶ 查看AI点评</div><div class="review-content" style="margin-top:4px;padding:8px 10px;background:rgba(124,58,237,.06);border-radius:8px;font-size:.72rem;line-height:1.6;color:var(--text-secondary);width:100%;border-left:3px solid var(--accent-purple)"><span style="color:var(--accent-cyan)">🤖 AI点评：</span>${r.review.replace(/\n/g,'<br>')}</div>`:''}</div>`).join('');
    const cE=document.getElementById('chatRecords'),cR=JSON.parse(localStorage.getItem('solar_cr')||'[]');
    cE.innerHTML=cR.length===0?'<div class="empty-state">💬 暂无对话存档<br><small>在问答页保存对话后可在此查看</small></div>':cR.map(r=>`<div class="record-card"><div><div style="font-size:.65rem;color:#64748b">${r.date}</div><div>${r.preview||'对话'}</div></div><button class="btn-sm" onclick="viewCR(${r.id})">查看</button><button class="btn-sm" onclick="delCR(${r.id})">删</button></div>`).join('');
}
function delQR(id){let r=JSON.parse(localStorage.getItem('solar_q')||'[]');r=r.filter(x=>x.id!==id);localStorage.setItem('solar_q',JSON.stringify(r));renderRecords()}
function delCR(id){let r=JSON.parse(localStorage.getItem('solar_cr')||'[]');r=r.filter(x=>x.id!==id);localStorage.setItem('solar_cr',JSON.stringify(r));renderRecords()}
function viewCR(id){
    const r=JSON.parse(localStorage.getItem('solar_cr')||'[]').find(x=>x.id===id);if(!r)return;
    document.getElementById('chatMessages').innerHTML='';
    window._ch=r.messages||[];(r.messages||[]).forEach(m=>{addChatMsg(m.role,m.content)});
    document.querySelector('#rightPanel [data-page="chat"]').click();
}

setAvatarIdle();
</script>
</body>
